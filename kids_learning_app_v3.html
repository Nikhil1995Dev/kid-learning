
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); }
  .app-wrap {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 40%, #f093fb 100%);
    min-height: 600px; padding: 16px 14px 24px; border-radius: 20px; position: relative; overflow: hidden;
  }
  .bg-shape { position: absolute; border-radius: 50%; opacity: 0.15; background: #fff; }
  .header { text-align: center; margin-bottom: 12px; position: relative; z-index: 2; }
  .header-title { font-size: 26px; font-weight: 500; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.82); margin-top: 2px; }
  .toggle-wrap { display: flex; justify-content: center; margin-bottom: 12px; position: relative; z-index: 2; }
  .toggle-bar { background: rgba(255,255,255,0.18); border-radius: 50px; padding: 4px; display: flex; gap: 4px; border: 1.5px solid rgba(255,255,255,0.35); }
  .toggle-btn { padding: 7px 18px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; background: transparent; color: rgba(255,255,255,0.85); border-radius: 50px; transition: all 0.2s; white-space: nowrap; }
  .toggle-btn.active { background: #fff; color: #534AB7; }
  .display-box {
    background: rgba(255,255,255,0.93); border-radius: 18px;
    min-height: 180px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin-bottom: 12px; padding: 16px 12px; position: relative; z-index: 2;
    border: 2px solid rgba(255,255,255,0.7);
  }
  .emoji-display { font-size: 150px; line-height: 1; margin-bottom: 8px; }
  .label-text { font-size: 20px; font-weight: 500; color: #534AB7; text-align: center; }
  .idle-icon { font-size: 44px; margin-bottom: 6px; }
  .idle-text { font-size: 14px; color: #888780; }
  .number-big { font-size: 90px; font-weight: 500; line-height: 1; color: #D85A30; }
  .number-word { font-size: 22px; font-weight: 500; color: #3B6D11; margin-top: 4px; }
  .dots-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; max-width: 240px; }
  .dot { width: 22px; height: 22px; border-radius: 50%; }

  .section-label {
    font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.9);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px; position: relative; z-index: 2;
    padding-left: 2px;
  }

  .keys-grid { display: grid; gap: 5px; position: relative; z-index: 2; margin-bottom: 10px; }
  .alpha-grid { grid-template-columns: repeat(auto-fill, minmax(36px, 1fr)); }
  .hindi-grid { grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); }
  .num-grid { grid-template-columns: repeat(5, 1fr); max-width: 280px; margin-left: auto; margin-right: auto; }

  .key-btn {
    border-radius: 10px; border: none;
    font-weight: 500; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
    padding: 0;
  }
  .key-btn.letter { font-size: 16px; height: 38px; }
  .key-btn.hindi { font-size: 15px; height: 38px; }
  .key-btn.number { font-size: 18px; aspect-ratio: 1; }
  .key-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 rgba(0,0,0,0.15); }
  .key-btn:active, .key-btn.pressed { transform: translateY(3px); box-shadow: 0 0px 0 rgba(0,0,0,0.18); }

  @keyframes popIn {
    0% { transform: scale(0.2) rotate(-10deg); opacity: 0; }
    70% { transform: scale(1.12) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .pop { animation: popIn 0.36s cubic-bezier(.36,1.5,.6,1) both; }
  @keyframes dotPop {
    0% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
  .dot { animation: dotPop 0.3s cubic-bezier(.36,1.5,.6,1) both; }

  .divider { height: 1px; background: rgba(255,255,255,0.25); margin: 8px 0; position: relative; z-index: 2; }
</style>

<div class="app-wrap" id="app">
  <div class="bg-shape" style="width:160px;height:160px;top:-55px;left:-55px;"></div>
  <div class="bg-shape" style="width:100px;height:100px;top:50px;right:-25px;"></div>
  <div class="bg-shape" style="width:180px;height:180px;bottom:-70px;right:-40px;"></div>
  <div class="bg-shape" style="width:80px;height:80px;bottom:30px;left:-15px;"></div>

  <div class="header">
    <div class="header-title">🌟 Learn with Me! 🌟</div>
    <div class="header-sub">Press a key or tap a button below</div>
  </div>

  <div class="toggle-wrap">
    <div class="toggle-bar">
      <button class="toggle-btn active" id="btn-alpha" onclick="switchMode('alpha')">🔤 A-Z</button>
      <button class="toggle-btn" id="btn-hindi" onclick="switchMode('hindi')">🇮🇳 हिंदी</button>
      <button class="toggle-btn" id="btn-num" onclick="switchMode('num')">🔢 1-10</button>
    </div>
  </div>

  <div class="display-box" id="display-box">
    <div class="idle-icon">👆</div>
    <div class="idle-text">Pick a letter to start!</div>
  </div>

  <div id="keys-container"></div>
</div>

<script>
const alphaData = {
  A:{emoji:"🍎",word:"Apple"},B:{emoji:"🦋",word:"Butterfly"},C:{emoji:"🐱",word:"Cat"},
  D:{emoji:"🐶",word:"Dog"},E:{emoji:"🐘",word:"Elephant"},F:{emoji:"🐸",word:"Frog"},
  G:{emoji:"🦒",word:"Giraffe"},H:{emoji:"🐎",word:"Horse"},I:{emoji:"🍦",word:"Ice Cream"},
  J:{emoji:"🦘",word:"Jaguar"},K:{emoji:"🪁",word:"Kite"},L:{emoji:"🦁",word:"Lion"},
  M:{emoji:"🐵",word:"Monkey"},N:{emoji:"🌙",word:"Night"},O:{emoji:"🐙",word:"Octopus"},
  P:{emoji:"🐧",word:"Penguin"},Q:{emoji:"👸",word:"Queen"},R:{emoji:"🌈",word:"Rainbow"},
  S:{emoji:"🌟",word:"Star"},T:{emoji:"🐯",word:"Tiger"},U:{emoji:"☂️",word:"Umbrella"},
  V:{emoji:"🌋",word:"Volcano"},W:{emoji:"🐋",word:"Whale"},X:{emoji:"🎻",word:"Xylophone"},
  Y:{emoji:"🧶",word:"Yarn"},Z:{emoji:"🦓",word:"Zebra"}
};

const hindiData = [
  {char:"अ",word:"अनार",emoji:"🍎",roman:"Anaar"},
  {char:"आ",word:"आम",emoji:"🥭",roman:"Aam"},
  {char:"इ",word:"इमली",emoji:"🌿",roman:"Imli"},
  {char:"ई",word:"ईख",emoji:"🎋",roman:"Eekh"},
  {char:"उ",word:"उल्लू",emoji:"🦉",roman:"Ullu"},
  {char:"ऊ",word:"ऊँट",emoji:"🐪",roman:"Oont"},
  {char:"ए",word:"एड़ी",emoji:"👣",roman:"Edi"},
  {char:"ऐ",word:"ऐनक",emoji:"👓",roman:"Ainak"},
  {char:"ओ",word:"ओस",emoji:"💧",roman:"Os"},
  {char:"औ",word:"औजार",emoji:"🔧",roman:"Auzaar"},
  {char:"क",word:"कबूतर",emoji:"🕊️",roman:"Kabootar"},
  {char:"ख",word:"खरगोश",emoji:"🐰",roman:"Khargosh"},
  {char:"ग",word:"गाय",emoji:"🐄",roman:"Gaay"},
  {char:"घ",word:"घड़ी",emoji:"⌚",roman:"Ghadi"},
  {char:"च",word:"चाँद",emoji:"🌙",roman:"Chaand"},
  {char:"छ",word:"छाता",emoji:"☂️",roman:"Chhaata"},
  {char:"ज",word:"जहाज",emoji:"✈️",roman:"Jahaaj"},
  {char:"झ",word:"झील",emoji:"🏞️",roman:"Jheel"},
  {char:"ट",word:"टमाटर",emoji:"🍅",roman:"Tamatar"},
  {char:"ठ",word:"ठेला",emoji:"🛒",roman:"Thela"},
  {char:"ड",word:"डमरू",emoji:"🥁",roman:"Damru"},
  {char:"ढ",word:"ढोल",emoji:"🪘",roman:"Dhol"},
  {char:"त",word:"तितली",emoji:"🦋",roman:"Titli"},
  {char:"थ",word:"थैला",emoji:"👜",roman:"Thaila"},
  {char:"द",word:"दरवाजा",emoji:"🚪",roman:"Darwaza"},
  {char:"ध",word:"धनुष",emoji:"🏹",roman:"Dhanush"},
  {char:"न",word:"नाव",emoji:"⛵",roman:"Naav"},
  {char:"प",word:"पतंग",emoji:"🪁",roman:"Patang"},
  {char:"फ",word:"फूल",emoji:"🌸",roman:"Phool"},
  {char:"ब",word:"बकरी",emoji:"🐐",roman:"Bakri"},
  {char:"भ",word:"भालू",emoji:"🐻",roman:"Bhaalu"},
  {char:"म",word:"मछली",emoji:"🐟",roman:"Machhli"},
  {char:"य",word:"यक",emoji:"🦬",roman:"Yak"},
  {char:"र",word:"रेलगाड़ी",emoji:"🚂",roman:"Railgadi"},
  {char:"ल",word:"लड्डू",emoji:"🍡",roman:"Laddu"},
  {char:"व",word:"वृक्ष",emoji:"🌳",roman:"Vriksh"},
  {char:"श",word:"शेर",emoji:"🦁",roman:"Sher"},
  {char:"स",word:"सूरज",emoji:"☀️",roman:"Suraj"},
  {char:"ह",word:"हाथी",emoji:"🐘",roman:"Haathi"},
];

const numWords = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten"];
let mode = 'alpha';

function speak(text) {
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.82; u.pitch = 1.2;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function showLetter(letter) {
  const d = alphaData[letter];
  document.getElementById('display-box').innerHTML = `
    <div class="emoji-display pop">${d.emoji}</div>
    <div class="label-text pop" style="animation-delay:0.08s">${letter} &nbsp;for&nbsp; <span style="color:#D85A30">${d.word}</span></div>
  `;
  speak(`${letter} for ${d.word}`);
}

function showHindi(item) {
  document.getElementById('display-box').innerHTML = `
    <div class="pop" style="font-size:86px;line-height:1;margin-bottom:8px">${item.emoji}</div>
    <div class="label-text pop" style="animation-delay:0.08s;font-size:22px">
      <span style="color:#D85A30;font-size:28px">${item.char}</span> &nbsp;—&nbsp; ${item.word}
    </div>
    <div class="pop" style="animation-delay:0.14s;font-size:13px;color:#888780;margin-top:4px">${item.roman}</div>
  `;
  speak(item.word);
}

function showNumber(n) {
  const dotColors = ['#1D9E75','#7F77DD','#D85A30','#378ADD','#EF9F27'];
  const dots = Array.from({length:n},(_,i)=>`<div class="dot" style="animation-delay:${i*0.06}s;background:${dotColors[i%5]}"></div>`).join('');
  document.getElementById('display-box').innerHTML = `
    <div class="number-big pop">${n}</div>
    <div class="number-word pop" style="animation-delay:0.08s">${numWords[n]}</div>
    <div class="dots-row">${dots}</div>
  `;
  speak(numWords[n]);
}

const letterColors = ['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA'];
const letterTextColors = ['#3C3489','#085041','#712B13','#72243E','#0C447C','#27500A','#633806'];

function buildAlphaKeys() {
  const c = document.getElementById('keys-container');
  c.innerHTML = `<div class="section-label">English A – Z</div><div class="keys-grid alpha-grid" id="keys-grid"></div>`;
  const grid = document.getElementById('keys-grid');
  Object.keys(alphaData).forEach((l,i) => {
    const ci = i % letterColors.length;
    const b = document.createElement('button');
    b.className = 'key-btn letter';
    b.style.background = letterColors[ci];
    b.style.color = letterTextColors[ci];
    b.textContent = l;
    b.onclick = () => { showLetter(l); pressEffect(b); };
    grid.appendChild(b);
  });
}

function buildHindiKeys() {
  const c = document.getElementById('keys-container');
  c.innerHTML = `
    <div class="section-label">Hindi Swar (स्वर)</div>
    <div class="keys-grid hindi-grid" id="swar-grid" style="margin-bottom:10px"></div>
    <div class="divider"></div>
    <div class="section-label" style="margin-top:8px">Hindi Vyanjan (व्यंजन)</div>
    <div class="keys-grid hindi-grid" id="vyanjan-grid"></div>
  `;
  const swarGrid = document.getElementById('swar-grid');
  const vyGrid = document.getElementById('vyanjan-grid');
  hindiData.forEach((item, i) => {
    const ci = i % letterColors.length;
    const b = document.createElement('button');
    b.className = 'key-btn hindi';
    b.style.background = letterColors[ci];
    b.style.color = letterTextColors[ci];
    b.textContent = item.char;
    b.onclick = () => { showHindi(item); pressEffect(b); };
    (i < 10 ? swarGrid : vyGrid).appendChild(b);
  });
}

function buildNumKeys() {
  const c = document.getElementById('keys-container');
  c.innerHTML = `<div class="section-label" style="text-align:center">Numbers 1 – 10</div><div class="keys-grid num-grid" id="keys-grid"></div>`;
  const grid = document.getElementById('keys-grid');
  for(let i=1;i<=10;i++) {
    const ci=(i-1)%letterColors.length;
    const b = document.createElement('button');
    b.className = 'key-btn number';
    b.style.background = letterColors[ci];
    b.style.color = letterTextColors[ci];
    b.textContent = i;
    b.onclick = () => { showNumber(i); pressEffect(b); };
    grid.appendChild(b);
  }
}

function pressEffect(btn) {
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'),180);
}

function switchMode(m) {
  mode = m;
  ['alpha','hindi','num'].forEach(x => document.getElementById('btn-'+x).classList.toggle('active', x===m));
  const box = document.getElementById('display-box');
  const icons = {alpha:'🔤',hindi:'🇮🇳',num:'🔢'};
  const hints = {alpha:'Pick a letter!',hindi:'एक अक्षर चुनें!',num:'Pick a number!'};
  box.innerHTML = `<div class="idle-icon">${icons[m]}</div><div class="idle-text">${hints[m]}</div>`;
  if(m==='alpha') buildAlphaKeys();
  else if(m==='hindi') buildHindiKeys();
  else buildNumKeys();
}

document.addEventListener('keydown', e => {
  const k = e.key.toUpperCase();
  if(mode==='alpha' && alphaData[k]) {
    showLetter(k);
    document.querySelectorAll('.key-btn').forEach(b=>{if(b.textContent===k)pressEffect(b);});
  }
  if(mode==='num') {
    const n=parseInt(e.key);
    if(n>=1&&n<=9){showNumber(n);document.querySelectorAll('.key-btn').forEach(b=>{if(parseInt(b.textContent)===n)pressEffect(b);});}
  }
});

buildAlphaKeys();
</script>
